#-------------------------------------------
# OUTPUT
#-------------------------------------------      
output:
  - platform: gpio
    pin: $relay_1
    id: 'relay_1'

  - platform: gpio
    pin: $relay_2
    id: 'relay_2'

  - platform: gpio
    pin: $relay_3
    id: 'relay_3'
    
#-------------------------------------------
# LIGHT
#-------------------------------------------
light:
  - platform: binary
    output: relay_1
    name: "1 лампа"
    id: light_relay_1
    restore_mode: ALWAYS_OFF
    icon: mdi:numeric-1-circle-outline
    on_turn_on:
      - if:
          condition:
            lambda: |-
              return id(g_tipe) == 4;
          then:
            - homeassistant.action:
                action: light.turn_on
                data:
                  entity_id: $light_1_device
    on_turn_off:
      - if:
          condition:
            lambda: |-
              return id(g_tipe) == 4;
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: $light_1_device


  - platform: binary
    output: relay_2
    name: "2 лампа"
    id: light_relay_2
    restore_mode: ALWAYS_OFF
    icon: mdi:numeric-2-circle-outline
    on_turn_on:
      - if:
          condition:
            lambda: |-
              return id(g_tipe) == 3;
          then:
            - homeassistant.action:
                action: light.turn_on
                data:
                  entity_id: $light_2_device
    on_turn_off:
      - if:
          condition:
            lambda: |-
              return id(g_tipe) == 3;
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: $light_2_device

  - platform: binary
    output: relay_3
    name: "3 лампа"
    id: light_relay_3
    restore_mode: ALWAYS_OFF
    icon: mdi:numeric-3-circle-outline
    on_turn_on:
      - if:
          condition:
            lambda: |-
              return id(g_tipe) == 2;
          then:
            - homeassistant.action:
                action: light.turn_on
                data:
                  entity_id: $light_3_device
    on_turn_off:
      - if:
          condition:
            lambda: |-
              return id(g_tipe) == 2;
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: $light_3_device
 
#-------------------------------------------
# SELECT
#-------------------------------------------
select:
  - platform: template
    name: "Тип выключателя"
    entity_category: config
    id: type_switch_id
    icon: mdi:nintendo-switch
    options:
      - "Тройной"              
      - "Одиночный"   # не реализовано
      - "Локальный-локальный-удаленный"   
      - "Локальный-удаленный-локальный" 
      - "Удаленный-локальный-локальный"                      
    initial_option: "Двойной"
    optimistic: true
    on_value:
      then:
        - lambda: |-
            id(g_tipe) = (i);

#-------------------------------------------
# GLOBALS
#-------------------------------------------            
globals:
  - id: g_tipe
    type: int
    restore_value: no
    initial_value: '0'

