#-------------------------------------------
# SENSOR BH1750
#-------------------------------------------
sensor:
  - platform: bh1750
    name: "Illuminance"
    id: ${id_bh}
    address: 0x23
    icon: mdi:brightness-5
    filters:
      - delta: 1 
      - throttle: 1s
#-------------------------------------------
# BINARY SENSOR
#-------------------------------------------
binary_sensor:
  - platform: analog_threshold
    name: "Датчик освещенности"
    id: illum
    threshold: 300
    sensor_id: ${id_bh}
    device_class: light
    icon: mdi:brightness-5

    
#-------------------------------------------
# SELECT
#-------------------------------------------
select:
  - platform: template
    name: "Чувствительность датчика освещенности"
    entity_category: config
    options:
     - "Очень высокая"      
     - "Высокая"
     - "Средняя"
     - "Низкая"
     - "Очень низкая"     
    initial_option: "Очень высокая"
    optimistic: true
    icon: mdi:microphone-message
    on_value:
      then:
        - lambda: |-
            switch(i) {
              case 0:
                 id(illum).set_lower_threshold([]() -> float { return 100.0f; });
                 id(illum).set_upper_threshold([]() -> float { return 100.0f; });
                 break;
              case 1: 
                 id(illum).set_lower_threshold([]() -> float { return 150.0f; });
                 id(illum).set_upper_threshold([]() -> float { return 150.0f; });
                break;
              case 2: 
                 id(illum).set_lower_threshold([]() -> float { return 200.0f; });
                 id(illum).set_upper_threshold([]() -> float { return 200.0f; });
                break;
              case 3: 
                 id(illum).set_lower_threshold([]() -> float { return 250.0f; });
                 id(illum).set_upper_threshold([]() -> float { return 250.0f; });
                 break;
              case 4: 
                 id(illum).set_lower_threshold([]() -> float { return 300.0f; });
                 id(illum).set_upper_threshold([]() -> float { return 300.0f; });
                break;
            }
