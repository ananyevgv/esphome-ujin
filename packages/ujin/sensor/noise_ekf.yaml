#-------------------------------------------
# I2S
#-------------------------------------------
i2s_audio:
  i2s_lrclk_pin: $noise_ws
  i2s_bclk_pin: $noise_bck

#-------------------------------------------
# MICROPHONE
#-------------------------------------------
microphone:
  - platform: i2s_audio
    id: external_mic
    adc_type: external
    i2s_din_pin: $noise_din
    channel: left
    pdm: true
    bits_per_sample: 16bit
   # bits_per_channel: 8bit
    sample_rate: 16000
    
    
#-------------------------------------------
# BINARY SENSOR
#-------------------------------------------
binary_sensor:
  - platform: analog_threshold
    name: "Датчик шума"
    id: noise
    threshold: -20
    sensor_id: Leq_id
    device_class: sound
    icon: mdi:speaker-wireless
    
#-------------------------------------------
# SWITCH
#-------------------------------------------
switch:
  - platform: template
    name: "Noise meter"
   # lambda: return id(Leq_id)->is_running();
    turn_on_action: 
      then:
        - sound_level.start #: Leq_id
    turn_off_action: 
      then:
        - sound_level.stop # : Leq_id
        
#-------------------------------------------
# SENSOR
#-------------------------------------------
sensor:
  - platform: sound_level
    passive: false
    peak:
      name: "шум пиковый уровень"
      id: Leq_id
      icon: mdi:waveform
      filters:
        - delta: 5
        
    
#-------------------------------------------
# SELECT
#-------------------------------------------
select:
  - platform: template
    name: "Чувствительность датчика звука"
    entity_category: config
    options:
     - "Очень высокая"      
     - "Высокая"
     - "Средняя"
     - "Низкая"
     - "Очень низкая"     
    initial_option: "Очень высокая"
    optimistic: true
    icon: mdi:microphone-message
    on_value:
      then:
        - lambda: |-
            switch(i) {
              case 0:
                 id(noise).set_lower_threshold(([]() -> float { return -50.0f; }));
                 id(noise).set_upper_threshold(([]() -> float { return -50.0f; }));
                 break;
              case 1: 
                id(noise).set_lower_threshold(([]() -> float { return -40.0f; }));
                id(noise).set_upper_threshold(([]() -> float { return -40.0f; }));
                break;
              case 2: 
                id(noise).set_lower_threshold(([]() -> float { return -30.0f; }));
                id(noise).set_upper_threshold(([]() -> float { return -30.0f; }));
                break;
              case 3: 
                id(noise).set_lower_threshold(([]() -> float { return -20.0f; }));
                id(noise).set_upper_threshold(([]() -> float { return -20.0f; }));
                break;
              case 4: 
                id(noise).set_lower_threshold(([]() -> float { return -10.0f; }));
                id(noise).set_upper_threshold(([]() -> float { return -10.0f; }));
                break;
            }

        